<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Professional Todo App</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://kit.fontawesome.com/812c8ee19a.js" crossorigin="anonymous"></script>
</head>
<body>

  <div class="container">
    <h1>Todo List</h1>

    <!-- Search -->
    <input type="text" id="searchInput" placeholder="Search todos..." class="search">

    <!-- Task List -->
    <ul id="taskList"></ul>

    <!-- Add Task -->
    <input type="text" id="taskInput" placeholder="Add a new todo..." class="add-input">
    <button id="addBtn" class="add-btn">Submit</button>
  </div>

<script src="script.js"></script>
</body>
</html>
